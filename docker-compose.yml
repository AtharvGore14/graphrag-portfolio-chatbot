services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme-neo4j-password}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
      HF_HOME: /cache/huggingface
    volumes:
      - ./backend:/app
      - ./web:/web:ro
      - ./scripts:/scripts:ro
      - ./tests:/tests:ro
      - hf_cache:/cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  neo4j_data:
  hf_cache:
